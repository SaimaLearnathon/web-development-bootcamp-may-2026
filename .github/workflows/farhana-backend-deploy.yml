name: Farhana Backend CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'farhanaislamsaima/server/**'
      - 'farhanaislamsaima/package.json'
      - 'farhanaislamsaima/package-lock.json'
      - 'farhanaislamsaima/.dockerignore'
      - '.github/workflows/farhana-backend-deploy.yml'
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: farhanasaima2110047
  IMAGE_NAME: chatapp-server
  RESOURCE_GROUP: chatapp-rg
  CONTAINER_APP_NAME: chat-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "DOCKERHUB_TOKEN secret is missing" && exit 1)
          test -n "${{ secrets.AZURE_CREDENTIALS }}" || (echo "AZURE_CREDENTIALS secret is missing" && exit 1)

      - name: Set image repository
        run: echo "IMAGE_REPOSITORY=docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./farhanaislamsaima
          file: ./farhanaislamsaima/server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
